---
version: 2.0
meta:
  asic: elba


queue_name: asic
image:
  bind_dir: "/psdiag"
  work_dir: "/psdiag"

e2e-targets:
  ortano-fst:
    commands: ["sh", "-c", "/psdiag/test/run_mfg_job.sh --testbed /warmd.json --test-type sanity --asic elba --testsuite /psdiag/test/spec/testsuites/ortano_fst.testsuite"]
    owners: ["email:nabeel@pensando.io"]
    area:
    sub-area:
    feature:
    max-duration: 24h
    build-dependencies:
     - build-amd64-elba
     - build-arm64-elba
    deployment:
      skip-pxe-install: true
    resources:
      - bm:
        - vendor: Pensando
          count: 1
          image: build-17
          props:
          - name: sanity-group
            value: diag-fst
          - name: mtp-nic-processor
            value: elba
          nics:
          - vendor: Intel
    provision:
      username: diag
      password: lab123
      vars:
        BmOs: linux

logfiles:
 - /psdiag/diag_detailed_log.tgz
