---
version: 2.0

queue_name: asic
image:
  bind_dir: "/psdiag"
  work_dir: "/psdiag"


logfiles:
 - /psdiag/diag_detailed_log.tgz

e2e-targets:
  naples100:
    commands: ["sh", "-c", "/psdiag/test/run_mfg_job.sh --nic-type naples100 --testbed /warmd.json --test-type precheckin --asic capri --testsuite /psdiag/test/spec/testsuites/P2C.testsuite"]
    owners: ["email:nabeel@pensando.io"]
    area:
    sub-area:
    feature:
    build-dependencies:
     - build-amd64-capri
     - build-arm64-capri
     - package-capri-mfg-script
    deployment:
      skip-pxe-install: true
    resources:
     - generic:
       - type: MTP
         vendor: Pensando
         count: 1
         props:
         - name: mtp-nic-processor
           value: capri
         - name: naples100
           value: yes
    provision:
      username: diag
      password: lab123
      vars:
        BmOs: linux

