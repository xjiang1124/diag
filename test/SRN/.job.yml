---
version: 2.0

queue_name: asic
image:
  bind_dir: "/psdiag"
  work_dir: "/psdiag"

host_mounts:
  "/hw": "/vol/hw"

logfiles:
 - /psdiag/diag_detailed_log.tgz

e2e-targets:
  ortano-ti-orc:
    commands: ["sh", "-c", "/psdiag/test/run_mfg_job.sh --nic-type ortano-ti-orc --testbed /warmd.json --test-type precheckin --asic elba --testsuite /psdiag/test/spec/testsuites/SRN.testsuite"]
    owners: ["email:nabeel@pensando.io"]
    area:
    sub-area:
    feature:
    build-dependencies:
     - build-amd64-elba
     - build-arm64-elba
     - package-elba-mfg-script
     - package-fw-assets
    deployment:
      skip-pxe-install: true
    resources:
     - generic:
       - type: MTP
         vendor: Pensando
         count: 1
         props:
         - name: mtp-nic-processor
           value: elba
         - name: ortano-ti
           value: yes
    provision:
      username: diag
      password: lab123
      vars:
        BmOs: linux

