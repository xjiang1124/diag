---
version: 2.0
builds:
  build-amd64-salina:
    commands: [ "sh", "-c", "cd build; make amd64 asic=salina asiclib=stable" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_amd64_salina.tar
  build-arm64-salina:
    commands: [ "sh", "-c", "cd build; make arm64 asic=salina asiclib=stable" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_arm64_salina.tar
  build-amd64-giglio:
    commands: [ "sh", "-c", "cd build; make amd64 asic=giglio asiclib=stable" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_amd64_giglio.tar
  build-arm64-giglio:
    commands: [ "sh", "-c", "cd build; make arm64 asic=giglio asiclib=stable" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_arm64_giglio.tar
    - /psdiag/build/images/nic_util.tar # save nic_util only once instead of for every asic
  build-amd64-elba:
    commands: [ "sh", "-c", "cd build; make amd64 asic=elba asiclib=stable" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_amd64_elba.tar
  build-arm64-elba:
    commands: [ "sh", "-c", "cd build; make arm64 asic=elba asiclib=stable" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_arm64_elba.tar
  build-amd64-capri:
    commands: [ "sh", "-c", "cd build; make amd64 asic=capri asiclib=stable" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_amd64_capri.tar
  build-arm64-capri:
    commands: [ "sh", "-c", "cd build; make arm64 asic=capri asiclib=stable" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_arm64_capri.tar

  build-amd64-salina-tot:
    commands: [ "sh", "-c", "cd build; make amd64 asic=salina asiclib=latest" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_amd64_salina.tar
  build-arm64-salina-tot:
    commands: [ "sh", "-c", "cd build; make arm64 asic=salina asiclib=latest" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_arm64_salina.tar
  build-amd64-giglio-tot:
    commands: [ "sh", "-c", "cd build; make amd64 asic=giglio asiclib=latest" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_amd64_giglio.tar
  build-arm64-giglio-tot:
    commands: [ "sh", "-c", "cd build; make arm64 asic=giglio asiclib=latest" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_arm64_giglio.tar
  build-amd64-elba-tot:
    commands: [ "sh", "-c", "cd build; make amd64 asic=elba asiclib=latest" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_amd64_elba.tar
  build-arm64-elba-tot:
    commands: [ "sh", "-c", "cd build; make arm64 asic=elba asiclib=latest" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_arm64_elba.tar

  package-salina-mfg-script:
    commands: [ "sh", "-c", "asic_type=salina bash -ex qa-infra/package-mfg-script.sh" ]
    owners: ["email:nabeel@pensando.io"]
    artifacts:
    - /psdiag/jobd/jobd.tar.gz
  package-giglio-mfg-script:
    commands: [ "sh", "-c", "asic_type=giglio bash -ex qa-infra/package-mfg-script.sh" ]
    owners: ["email:nabeel@pensando.io"]
    artifacts:
    - /psdiag/jobd/jobd.tar.gz
  package-elba-mfg-script:
    commands: [ "sh", "-c", "asic_type=elba bash -ex qa-infra/package-mfg-script.sh" ]
    owners: ["email:nabeel@pensando.io"]
    artifacts:
    - /psdiag/jobd/jobd.tar.gz
  package-capri-mfg-script:
    commands: [ "sh", "-c", "asic_type=capri bash -ex qa-infra/package-mfg-script.sh" ]
    owners: ["email:nabeel@pensando.io"]
    artifacts:
    - /psdiag/jobd/jobd.tar.gz
  package-fw-assets:
    commands: [ "sh", "-c", "bash -ex qa-infra/package-fw.sh" ]
    owners: ["email:nabeel@pensando.io"]
    artifacts:
    - /psdiag/fw.tar

queue_name: asic
image:
  bind_dir: "/psdiag"
host_mounts:
  "/hw": "/vol/hw"

jobs:
  asset-build:
    labels: ["CI-DIAG-Build", "CI-DIAG-Release"]
  qa-infra/daily:
    labels: ["CI-DIAG-Daily"]
  diag/scripts/asic:
    labels: ["CI-DIAG-Tests"]
  diag/python/regression:
    labels: ["CI-DIAG-Tests"]
  diag/python/esec:
    labels: ["CI-DIAG-Tests"]
### JOB LABELS ###
  test/FST:
    labels: ["CI-DIAG-Model", "CI-DIAG-Release", "CI-DIAG-FST"]
  test/DL:
    labels: ["CI-DIAG-Model", "CI-DIAG-Release", "CI-DIAG-DL"]
  test/P2C:
    labels: ["CI-DIAG-Model", "CI-DIAG-Release", "CI-DIAG-P2C"]
  test/4C:
    labels: ["CI-DIAG-Model", "CI-DIAG-Release", "CI-DIAG-4C"]
  test/SWI:
    labels: ["CI-DIAG-Model", "CI-DIAG-Release", "CI-DIAG-SWI"]
  test/SRN:
    labels: ["CI-DIAG-Model", "CI-DIAG-Release", "CI-DIAG-SRN"]
  test/ScanDL:
    labels: ["CI-DIAG-Model", "CI-DIAG-Release", "CI-DIAG-ScanDL"]
  test/ORT:
    labels: ["CI-DIAG-Model", "CI-DIAG-Release", "CI-DIAG-ORT"]
  test/RDT:
    labels: ["CI-DIAG-Model", "CI-DIAG-Release", "CI-DIAG-RDT"]
### END JOB LABELS ###
### ASIC JOB LABELS ###
  test-asic/4C:
    labels: ["CI-ASIC-TOT", "CI-ASIC-TOT-4C"]
  test-asic/SWI:
    labels: ["CI-ASIC-TOT", "CI-ASIC-TOT-SWI"]
  test-asic/SRN:
    labels: ["CI-ASIC-TOT", "CI-ASIC-TOT-SRN"]
### END ASIC JOB LABELS ###

dependencies:
  .:
    - reference: test/FST
  test/infra:
    - reference: test/FST
  qa/infra:
    - reference: test/FST
  build:
    - reference: asset-build
  asset-build:
    - reference: asset-build
  diag/scripts/asic:
    - reference: diag/scripts/asic
  diag/python/regression:
    - reference: diag/python/regression
  diag/python/esec:
    - reference: diag/python/esec
  diag/python/esec/scripts:
    - reference: diag/python/esec

  diag:
### TEST DIAG CHANGES ###
    - reference: test/P2C
      exclude_dirs: ["mfg"]
### END TEST DIAG CHANGES ###

  diag/mfg:
### TEST SCRIPT CHANGES ###
    - reference: test/FST
      exclude_dirs: ["scripts"]
    - reference: test/P2C
      exclude_dirs: ["scripts"]
    - reference: test/SWI
      exclude_dirs: ["scripts"]
    - reference: test/SRN
      exclude_dirs: ["scripts"]
### END TEST SCRIPT CHANGES ###
  diag/mfg/scripts:
    - reference: test/FST
