---
version: 2.0
builds:
  build-amd64-giglio:
    commands: [ "sh", "-c", "cd build; make amd64 asic=giglio asiclib=unpackaged" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_amd64_giglio.tar
  build-arm64-giglio:
    commands: [ "sh", "-c", "cd build; make arm64 asic=giglio asiclib=unpackaged" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_arm64_giglio.tar
  build-amd64-elba:
    commands: [ "sh", "-c", "cd build; make amd64 asic=elba asiclib=unpackaged" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_amd64_elba.tar
  build-arm64-elba:
    commands: [ "sh", "-c", "cd build; make arm64 asic=elba asiclib=unpackaged" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_arm64_elba.tar
  build-amd64-capri:
    commands: [ "sh", "-c", "cd build; make amd64 asic=capri asiclib=unpackaged" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_amd64_capri.tar
  build-arm64-capri:
    commands: [ "sh", "-c", "cd build; make arm64 asic=capri asiclib=unpackaged" ]
    owners: ["email:xin@pensando.io"]
    artifacts:
    - /psdiag/build/images/image_arm64_capri.tar
  package-giglio-mfg-script:
    commands: [ "sh", "-c", "branch_or_tag=jobd asic_type=giglio working_dir=/psdiag bash -ex ./mfg-release-script.sh" ]
    owners: ["email:nabeel@pensando.io"]
    artifacts:
    - /psdiag/jobd/jobd.tar.gz
    - /psdiag/jobd/fw.tar.gz
  package-elba-mfg-script:
    commands: [ "sh", "-c", "branch_or_tag=jobd asic_type=elba working_dir=/psdiag bash -ex ./mfg-release-script.sh" ]
    owners: ["email:nabeel@pensando.io"]
    artifacts:
    - /psdiag/jobd/jobd.tar.gz
    - /psdiag/jobd/fw.tar.gz
  package-capri-mfg-script:
    commands: [ "sh", "-c", "branch_or_tag=jobd asic_type=capri working_dir=/psdiag bash -ex ./mfg-release-script.sh" ]
    owners: ["email:nabeel@pensando.io"]
    artifacts:
    - /psdiag/jobd/jobd.tar.gz
    - /psdiag/jobd/fw.tar.gz

queue_name: asic
image:
  bind_dir: "/psdiag"
host_mounts:
  "/hw": "/vol/hw"

jobs:
  asset-build:
    labels: ["CI-DIAG-Build"]
  test/DL:
    labels: ["CI-DIAG-DL"]
  test/ScanDL:
    labels: ["CI-DIAG-ScanDL"]
  test/P2C:
    labels: ["CI-DIAG-P2C"]
  test/4C:
    labels: ["CI-DIAG-4C", "CI-DIAG-Regression"]
  test/SWI:
    labels: ["CI-DIAG-SWI"]
  test/FST:
    labels: ["CI-DIAG-FST"]
### NIC_TYPE TEST BUNDLE ###
  test/ginestra:
    labels: ["CI-DIAG-Build", "CI-DIAG-ginestra"]
  test/monterey:
    labels: ["CI-DIAG-Build", "CI-DIAG-monterey"]
  test/ortano-adicr-orc:
    labels: ["CI-DIAG-Build", "CI-DIAG-ortano-adicr-orc"]
  test/ortano-solo-orc:
    labels: ["CI-DIAG-Build", "CI-DIAG-ortano-solo-orc"]
  test/ortano-interp-orc:
    labels: ["CI-DIAG-Build", "CI-DIAG-ortano-interp-orc"]
  test/ortano-adi-orc:
    labels: ["CI-DIAG-Build", "CI-DIAG-ortano-adi-orc"]
  test/ortano-ti-orc:
    labels: ["CI-DIAG-Build", "CI-DIAG-ortano-ti-orc"]
  test/naples25swm-hpe:
    labels: ["CI-DIAG-Build", "CI-DIAG-naples25swm-hpe"]
  test/naples100:
    labels: ["CI-DIAG-Build", "CI-DIAG-naples100"]
### END NIC_TYPE TEST BUNDLE ###

dependencies:
  test/infra:
    - reference: test/FST
  qa/infra:
    - reference: test/FST

  diag:
    - reference: test/DL
      exclude_dirs: ["mfg"]
    - reference: test/P2C
      exclude_dirs: ["mfg"]

  diag/mfg:
### NIC_TYPE DEPENDENCY ###
    - reference: test/ginestra
      exclude_dirs: ["scripts"]
    - reference: test/monterey
      exclude_dirs: ["scripts"]
    - reference: test/ortano-adicr-orc
      exclude_dirs: ["scripts"]
    - reference: test/ortano-solo-orc
      exclude_dirs: ["scripts"]
    - reference: test/ortano-interp-orc
      exclude_dirs: ["scripts"]
    - reference: test/ortano-adi-orc
      exclude_dirs: ["scripts"]
    - reference: test/ortano-ti-orc
      exclude_dirs: ["scripts"]
    - reference: test/naples25swm-hpe
      exclude_dirs: ["scripts"]
    - reference: test/naples100
      exclude_dirs: ["scripts"]
### END NIC_TYPE DEPENDENCY ###

  diag/mfg/mtp_dl_script:
    - reference: test/DL
  diag/mfg/mtp_diag_regression:
    - reference: test/P2C
    - reference: test/4C
  diag/mfg/mtp_swi_script:
    - reference: test/SWI
  diag/mfg/mtp_fst_script:
    - reference: test/FST
