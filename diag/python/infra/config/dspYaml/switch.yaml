#
# DSP YAML Configuration Rules
#
# PARAM under COMMON apply to all tests/cmds as default setting. If the value is 
# redefined in TEST/CMD section, previous default is overwritten by the new value.
#
# For each parameter entry, "VALUE" and "INFO" fields are mandatory. INFO can be
# empty though.
#
# Parameter value convention
# 1. "ALL", platform name, and individual card name are allowed
# 2. "ALL" applies the setting to all cards in "PLATFORM"
# 3. If platform name is specified, setting applies to all cards under the specific
#    DSP. 
# 4. Multiple card names can be used on the same setting separated by "#"
# 5. Previous setting is overwritting by later ones, e.g. NAPLES timeout first got 
#    set to 30 and change to 60 after evaluating the next line.
#    timeout:
#       VALUE:
#           ALL:30
#           NAPLES:60
#
# PRIORTY:
# Three levels of priority are supported
# 1. SYS_EXC: system wide exclusive. Only the particular test is allowed to run 
#    through out entire systems (e.g., amoung all NIC cards).
# 2. CARD_EXC: card level exclusive. Only the particular test can be outstanding
#    whin the host card.
# 3. NORMAL: test can run with other tests.
#
# Remarks:
# 1. Do not use the same name between platform and card. Parser will get confused
# 2. Use quotes on hex numbers (as string) since python converts raw hex value to a
#    integer.
# 3. "ALL" is reserved phrase. If used with platform, it means every card under the
#    particular card type. If used with parameter, it means parameter setting applies
#    to all cards defined under "PLATFORM" section.
#

---
DSP: 
    NAME: SWITCH
    INFO: DSP for TOR SWITCHES
    #TYPE: HOST

    # Properties apply to all platforms
    # Do not remove ite/timeout/dshid which are needed for all DSPs
    COMMON:
        PARAM:
            ite: 
                VALUE: 1
                INFO: Iterations for the test
            timeout:
                VALUE: 100
                INFO: Test timeout setting 
            dshid:
                VALUE: 0
                INFO: Diag shell ID index

    TEST#INVENTORY:
        INFO: Log the inventory like dimms, ssd, psu, etc
        PLATFORM:
            TOR: ALL
        PRIORITY: NORMAL 
        PARAM:

    TEST#PRESENT:
        INFO: Test the fans RPM across PWM setting
        PLATFORM:
            TOR: ALL
        PRIORITY: NORMAL 
        PARAM:

    TEST#FANRPM:
        INFO: Test the fans RPM across PWM setting
        PLATFORM:
            TOR: ALL
        PRIORITY: NORMAL 
        PARAM:
            tollerance:
                VALUE:
                    ALL: 15
                INFO: rpm tollerance

    TEST#SNAKE:
        INFO: Snake test for TD3 and ELBA
        PLATFORM:
            TOR: ALL
        PRIORITY: NORMAL 
        PARAM:
            timeout:
                VALUE: 
                    ALL: 350
                INFO: Test timeout setting
            mask:
                VALUE:
                    ALL: 0xFF
                INFO: TD3 Link Mask to Elba's.  Used to mask off Elba Links
            duration:
                VALUE:
                    ALL: 300
                INFO: Test Duration in seconds
            loopback:
                VALUE:
                    ALL: ext
                INFO: Loopback Level, phy or ext

    TEST#ELBA_ARM_MEMORY:
        INFO: Arm memory test from Linux
        PLATFORM:
            TOR: ALL
        PARAM:
            timeout:
                VALUE:
                    ALL: 360
                INFO: Test timeout setting
            testtime:
                VALUE:
                    ALL: 300
                INFO: Test timeout setting
            mask:
                VALUE:
                    ALL: 0x3
                INFO: Elba test Mask   0x1 elba0    0x2 elba1   0x3 Both Elbas

    TEST#ELBA_RTC:
        INFO: Elba Real Time Clock Test
        PLATFORM:
            TOR: ALL
        PARAM:
            timeout:
                VALUE:
                    ALL: 30
                INFO: Test timeout setting
            mask:
                VALUE:
                    ALL: 0x3
                INFO: Elba test Mask   0x1 elba0    0x2 elba1   0x3 Both Elbas                

    TEST#FPGA_STRAPPING:
        INFO: Check FPGA Resistor Strapping
        PLATFORM:
            TOR: ALL
        PARAM:
            timeout:
                VALUE:
                    ALL: 10
                INFO: Test timeout setting
            expectedvalue:
                VALUE:
                    ALL: 0x2
                INFO: Expected Resistor Strapping Value

    TEST#VRM_FIX:
        INFO: VRM Fix for TD3 and Elba
        PLATFORM:
            TOR: ALL
        PARAM:
            timeout:
                VALUE:
                    ALL: 30
                INFO: Test timeout setting

...
